services:
  audiobookbay-rd:
    build: .
    image: audiobookbay-automated-rd:latest
    ports:
      - "5078:5078"
    container_name: audiobookbay-automated-rd
    environment:
      - REAL_DEBRID_API_TOKEN=${REAL_DEBRID_API_TOKEN:-}
      - AUDIOBOOKSHELF_URL=${AUDIOBOOKSHELF_URL:-http://audiobookshelf:80}
      - AUDIOBOOKSHELF_API_TOKEN=${AUDIOBOOKSHELF_API_TOKEN:-}
      - AUDIOBOOKSHELF_LIBRARY_ID=${AUDIOBOOKSHELF_LIBRARY_ID:-}
      - AUDIOBOOKSHELF_IMPORT_DIR=${AUDIOBOOKSHELF_IMPORT_DIR:-/abs-import}
      - ABB_HOSTNAME=${ABB_HOSTNAME:-audiobookbay.lu}
      - PAGE_LIMIT=${PAGE_LIMIT:-5}
      - DATABASE_PATH=/data/audiobooks.db
      - FLASK_PORT=5078
    volumes:
      - ./data:/data
      - ./data/abs-audiobooks:/abs-import
    env_file:
      - path: .env
        required: false
    depends_on:
      - audiobookshelf

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - "13378:80"
    volumes:
      - ./abs/config:/config
      - ./abs/metadata:/metadata
      - ./data/abs-audiobooks:/audiobooks
    restart: unless-stopped
