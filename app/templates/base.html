<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AudiobookBay Real-Debrid{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
    {% block extra_js %}{% endblock %}
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="site-header">
        <nav class="navbar" aria-label="Primary navigation">
            <a class="brand" href="{{ url_for('search') }}" aria-label="AudiobookBay Real-Debrid home">
                <span class="brand-mark">AB</span>
                <span class="brand-copy">
                    <span class="brand-title">AudiobookBay RD</span>
                    <span class="brand-subtitle">Quiet listening library</span>
                </span>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('search') }}" class="nav-link {% if request.endpoint == 'search' %}active{% endif %}">Search</a>
                <a href="{{ url_for('library') }}" class="nav-link {% if request.endpoint in ['library', 'book_player'] %}active{% endif %}">Library</a>
            </div>
        </nav>
    </header>

    <main class="content" id="main-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
